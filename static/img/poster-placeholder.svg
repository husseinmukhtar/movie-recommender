  </defs>
  <rect width="300" height="450" fill="url(#poster-bg)"/>
  <rect x="22" y="22" width="256" height="406" rx="14" fill="#0b0c10" fill-opacity="0.34" stroke="#c5c6c7" stroke-opacity="0.24"/>
  <circle cx="150" cy="154" r="50" fill="none" stroke="#66fcf1" stroke-width="10"/>
  <polygon points="140,128 140,180 181,154" fill="#66fcf1"/>
  <rect x="66" y="260" width="168" height="14" rx="7" fill="#ffffff" fill-opacity="0.82"/>
