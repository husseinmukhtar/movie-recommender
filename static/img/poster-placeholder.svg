<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" role="img" aria-labelledby="title desc">
  <title id="title">Movie poster placeholder</title>
  <desc id="desc">A generic movie poster used when a recommendation has no poster image.</desc>
